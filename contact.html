<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Submit Files | LexGlobal</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <!-- Navigation Header -->
    <header class="bg-slate-950 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-wider text-amber-400">LEX<span class="text-white">GLOBAL</span></a>
            <nav class="space-x-6 text-sm font-medium">
                <a href="index.html" class="hover:text-amber-400 transition">Home</a>
                <a href="cases.html" class="hover:text-amber-400 transition">Case Summaries</a>
                <a href="contact.html" class="text-amber-400">Hire Me</a>
            </nav>
        </div>
    </header>

    <!-- Main Form Section -->
    <main class="max-w-xl mx-auto px-6 py-12 flex-grow w-full">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Request Document Review</h1>
            <p class="text-slate-500 text-sm mb-6">Fill in your requirements below. I will respond via email with confirmation within 12 hours.</p>

            <!-- Form -->
            <form action="#" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Full Name</label>
                    <input type="text" required class="w-full border border-slate-300 p-2 rounded focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Business Email</label>
                    <input type="email" required class="w-full border border-slate-300 p-2 rounded focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Service Requested</label>
                    <select class="w-full border border-slate-300 p-2 rounded focus:outline-none focus:border-amber-500 text-sm bg-white">
                        <option value="single">Single Document Review ($49)</option>
                        <option value="brief">Case Brief / Analysis ($120)</option>
                        <option value="custom">Custom Legal Outlining</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Document Link / Project Details</label>
                    <textarea rows="4" required placeholder="Paste a Google Drive link to your agreement, or type out your legal research question here..." class="w-full border border-slate-300 p-2 rounded focus:outline-none focus:border-amber-500 text-sm"></textarea>
                </div>
                <button type="submit" class="w-full bg-amber-500 text-slate-950 font-bold p-3 rounded-lg hover:bg-amber-400 transition shadow">
                    Submit Request Securely
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-400 py-6 text-center text-xs px-6 border-t border-slate-900">
        <p>&copy; 2026 LexGlobal. Secure processing interface.</p>
    </footer>

</body>
</html>
